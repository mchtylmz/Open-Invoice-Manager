<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="800" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="500">
      <stop offset="0%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="60" fill="url(#header)"/>
  <text x="30" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff">Settings</text>

  <!-- Sidebar -->
  <rect x="20" y="80" width="180" height="340" rx="8" fill="#fff" stroke="#D1D5DB"/>
  <rect x="20" y="80" width="180" height="340" rx="8" fill="#fff" stroke="#D1D5DB"/>
  <rect x="20" y="80" width="180" height="45" rx="8" fill="#4F46E5" opacity="0.1"/>
  <text x="35" y="108" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4F46E5">🏢 Company Profile</text>
  <text x="35" y="140" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">💰 Tax Settings</text>
  <text x="35" y="172" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">🔔 Notifications</text>
  <text x="35" y="204" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">🎨 Invoice Design</text>
  <text x="35" y="236" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">🌍 Localization</text>
  <text x="35" y="268" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">🔐 Security</text>
  <text x="35" y="300" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">👥 Users</text>
  <text x="35" y="332" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">📧 Email</text>
  <text x="35" y="364" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">🔗 Integrations</text>
  <text x="35" y="396" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">📊 Export</text>

  <!-- Main Form -->
  <rect x="215" y="80" width="565" height="340" rx="8" fill="#fff" stroke="#D1D5DB"/>
  <text x="235" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#374151">Company Profile</text>
  <text x="235" y="130" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Manage your company information displayed on invoices and quotes.</text>

  <line x1="235" y1="145" x2="760" y2="145" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Form fields -->
  <text x="235" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#374151">Company Name</text>
  <rect x="235" y="178" width="250" height="34" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="245" y="200" font-family="Arial, sans-serif" font-size="13" fill="#374151">Your Company Ltd.</text>

  <text x="510" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#374151">Tax/VAT Number</text>
  <rect x="510" y="178" width="250" height="34" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="520" y="200" font-family="Arial, sans-serif" font-size="13" fill="#374151">VAT-123456789</text>

  <text x="235" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#374151">Email</text>
  <rect x="235" y="248" width="250" height="34" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="245" y="270" font-family="Arial, sans-serif" font-size="13" fill="#374151">info@yourcompany.com</text>

  <text x="510" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#374151">Phone</text>
  <rect x="510" y="248" width="250" height="34" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="520" y="270" font-family="Arial, sans-serif" font-size="13" fill="#374151">+1 (555) 000-0000</text>

  <text x="235" y="310" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#374151">Address</text>
  <rect x="235" y="318" width="525" height="34" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="245" y="340" font-family="Arial, sans-serif" font-size="13" fill="#374151">123 Business Ave, Suite 100, New York, NY 10001</text>

  <text x="235" y="370" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#374151">Website</text>
  <rect x="235" y="378" width="250" height="34" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="245" y="400" font-family="Arial, sans-serif" font-size="13" fill="#374151">https://yourcompany.com</text>

  <!-- Save Button -->
  <rect x="660" y="378" width="100" height="34" rx="6" fill="#4F46E5"/>
  <text x="710" y="400" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Save</text>

  <!-- Footer text -->
  <rect x="0" y="470" width="800" height="30" fill="#374151" opacity="0.05"/>
  <text x="400" y="488" font-family="Arial, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">Screenshot placeholder</text>
</svg>
