<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="800" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="500">
      <stop offset="0%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="60" fill="url(#header)"/>
  <text x="30" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff">Customers</text>

  <!-- Search bar -->
  <rect x="20" y="80" width="300" height="36" rx="6" fill="#fff" stroke="#D1D5DB"/>
  <text x="40" y="103" font-family="Arial, sans-serif" font-size="13" fill="#9CA3AF">Search customers...</text>
  <rect x="340" y="80" width="120" height="36" rx="6" fill="#4F46E5"/>
  <text x="400" y="103" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">+ Add Customer</text>

  <!-- Table -->
  <rect x="20" y="135" width="765" height="280" rx="8" fill="#fff" stroke="#D1D5DB"/>
  <rect x="20" y="135" width="765" height="40" rx="8" fill="#F9FAFB"/>
  <text x="40" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">All Customers</text>

  <!-- Table Header -->
  <line x1="20" y1="175" x2="785" y2="175" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">NAME</text>
  <text x="250" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">EMAIL</text>
  <text x="440" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">PHONE</text>
  <text x="600" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">TOTAL</text>
  <text x="700" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">ACTIONS</text>

  <!-- Row 1 -->
  <line x1="20" y1="210" x2="785" y2="210" stroke="#F3F4F6" stroke-width="1"/>
  <circle cx="55" cy="235" r="14" fill="#4F46E5" opacity="0.1"/>
  <text x="55" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4F46E5" text-anchor="middle">JD</text>
  <text x="82" y="240" font-family="Arial, sans-serif" font-size="13" fill="#374151">John Doe</text>
  <text x="250" y="240" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">john@acme.com</text>
  <text x="440" y="240" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">+1 (555) 0100</text>
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="13" fill="#374151">$12,500</text>
  <text x="700" y="240" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">👁 ✏️ 🗑</text>

  <!-- Row 2 -->
  <line x1="20" y1="253" x2="785" y2="253" stroke="#F3F4F6" stroke-width="1"/>
  <circle cx="55" cy="278" r="14" fill="#059669" opacity="0.1"/>
  <text x="55" y="283" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#059669" text-anchor="middle">JS</text>
  <text x="82" y="283" font-family="Arial, sans-serif" font-size="13" fill="#374151">Jane Smith</text>
  <text x="250" y="283" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">jane@globex.io</text>
  <text x="440" y="283" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">+1 (555) 0200</text>
  <text x="600" y="283" font-family="Arial, sans-serif" font-size="13" fill="#374151">$8,400</text>
  <text x="700" y="283" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">👁 ✏️ 🗑</text>

  <!-- Row 3 -->
  <line x1="20" y1="296" x2="785" y2="296" stroke="#F3F4F6" stroke-width="1"/>
  <circle cx="55" cy="321" r="14" fill="#D97706" opacity="0.1"/>
  <text x="55" y="326" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#D97706" text-anchor="middle">BW</text>
  <text x="82" y="326" font-family="Arial, sans-serif" font-size="13" fill="#374151">Bob Wilson</text>
  <text x="250" y="326" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">bob@initech.com</text>
  <text x="440" y="326" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">+1 (555) 0300</text>
  <text x="600" y="326" font-family="Arial, sans-serif" font-size="13" fill="#374151">$3,200</text>
  <text x="700" y="326" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">👁 ✏️ 🗑</text>

  <!-- Row 4 -->
  <line x1="20" y1="339" x2="785" y2="339" stroke="#F3F4F6" stroke-width="1"/>
  <circle cx="55" cy="364" r="14" fill="#EF4444" opacity="0.1"/>
  <text x="55" y="369" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#EF4444" text-anchor="middle">AG</text>
  <text x="82" y="369" font-family="Arial, sans-serif" font-size="13" fill="#374151">Alice Green</text>
  <text x="250" y="369" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">alice@hooli.com</text>
  <text x="440" y="369" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">+1 (555) 0400</text>
  <text x="600" y="369" font-family="Arial, sans-serif" font-size="13" fill="#374151">$6,750</text>
  <text x="700" y="369" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">👁 ✏️ 🗑</text>

  <!-- Row 5 -->
  <line x1="20" y1="382" x2="785" y2="382" stroke="#F3F4F6" stroke-width="1"/>
  <circle cx="55" cy="407" r="14" fill="#2563EB" opacity="0.1"/>
  <text x="55" y="412" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2563EB" text-anchor="middle">TB</text>
  <text x="82" y="412" font-family="Arial, sans-serif" font-size="13" fill="#374151">Tom Brown</text>
  <text x="250" y="412" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">tom@umbrella.com</text>
  <text x="440" y="412" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">+1 (555) 0500</text>
  <text x="600" y="412" font-family="Arial, sans-serif" font-size="13" fill="#374151">$15,200</text>
  <text x="700" y="412" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">👁 ✏️ 🗑</text>

  <!-- Footer text -->
  <rect x="0" y="470" width="800" height="30" fill="#374151" opacity="0.05"/>
  <text x="400" y="488" font-family="Arial, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">Screenshot placeholder</text>
</svg>
