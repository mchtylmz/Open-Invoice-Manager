<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="800" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="500">
      <stop offset="0%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="60" fill="url(#header)"/>
  <text x="30" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff">Invoices</text>

  <!-- Filter / Search -->
  <rect x="20" y="80" width="250" height="36" rx="6" fill="#fff" stroke="#D1D5DB"/>
  <text x="40" y="103" font-family="Arial, sans-serif" font-size="13" fill="#9CA3AF">Search invoices...</text>
  <rect x="290" y="80" width="100" height="36" rx="6" fill="#fff" stroke="#D1D5DB"/>
  <text x="340" y="103" font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">All Status ▼</text>
  <rect x="660" y="80" width="120" height="36" rx="6" fill="#4F46E5"/>
  <text x="720" y="103" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">+ New Invoice</text>

  <!-- Table -->
  <rect x="20" y="135" width="765" height="280" rx="8" fill="#fff" stroke="#D1D5DB"/>
  <rect x="20" y="135" width="765" height="40" rx="8" fill="#F9FAFB"/>
  <text x="40" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">All Invoices</text>

  <!-- Table Header -->
  <line x1="20" y1="175" x2="785" y2="175" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">INVOICE</text>
  <text x="180" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">CUSTOMER</text>
  <text x="340" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">ISSUE DATE</text>
  <text x="470" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">DUE DATE</text>
  <text x="580" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">AMOUNT</text>
  <text x="690" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">STATUS</text>

  <!-- Row 1 - Paid -->
  <line x1="20" y1="210" x2="785" y2="210" stroke="#F3F4F6" stroke-width="1"/>
  <text x="40" y="236" font-family="Arial, sans-serif" font-size="13" fill="#374151">#INV-2024-001</text>
  <text x="180" y="236" font-family="Arial, sans-serif" font-size="13" fill="#374151">Acme Corp</text>
  <text x="340" y="236" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-03-01</text>
  <text x="470" y="236" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-03-15</text>
  <text x="580" y="236" font-family="Arial, sans-serif" font-size="13" fill="#374151">$1,250.00</text>
  <circle cx="698" cy="232" r="5" fill="#059669"/>
  <rect x="710" y="224" width="45" height="18" rx="9" fill="#059669" opacity="0.1"/>
  <text x="732" y="236" font-family="Arial, sans-serif" font-size="10" fill="#059669" text-anchor="middle">Paid</text>

  <!-- Row 2 - Pending -->
  <line x1="20" y1="253" x2="785" y2="253" stroke="#F3F4F6" stroke-width="1"/>
  <text x="40" y="279" font-family="Arial, sans-serif" font-size="13" fill="#374151">#INV-2024-002</text>
  <text x="180" y="279" font-family="Arial, sans-serif" font-size="13" fill="#374151">Globex Inc</text>
  <text x="340" y="279" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-03-05</text>
  <text x="470" y="279" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-03-20</text>
  <text x="580" y="279" font-family="Arial, sans-serif" font-size="13" fill="#374151">$3,400.00</text>
  <circle cx="698" cy="275" r="5" fill="#D97706"/>
  <rect x="710" y="267" width="55" height="18" rx="9" fill="#D97706" opacity="0.1"/>
  <text x="737" y="279" font-family="Arial, sans-serif" font-size="10" fill="#D97706" text-anchor="middle">Pending</text>

  <!-- Row 3 - Overdue -->
  <line x1="20" y1="296" x2="785" y2="296" stroke="#F3F4F6" stroke-width="1"/>
  <text x="40" y="322" font-family="Arial, sans-serif" font-size="13" fill="#374151">#INV-2024-003</text>
  <text x="180" y="322" font-family="Arial, sans-serif" font-size="13" fill="#374151">Initech</text>
  <text x="340" y="322" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-02-15</text>
  <text x="470" y="322" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-03-01</text>
  <text x="580" y="322" font-family="Arial, sans-serif" font-size="13" fill="#374151">$750.00</text>
  <circle cx="698" cy="318" r="5" fill="#EF4444"/>
  <rect x="710" y="310" width="55" height="18" rx="9" fill="#EF4444" opacity="0.1"/>
  <text x="737" y="322" font-family="Arial, sans-serif" font-size="10" fill="#EF4444" text-anchor="middle">Overdue</text>

  <!-- Row 4 - Paid -->
  <line x1="20" y1="339" x2="785" y2="339" stroke="#F3F4F6" stroke-width="1"/>
  <text x="40" y="365" font-family="Arial, sans-serif" font-size="13" fill="#374151">#INV-2024-004</text>
  <text x="180" y="365" font-family="Arial, sans-serif" font-size="13" fill="#374151">Hooli</text>
  <text x="340" y="365" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-03-10</text>
  <text x="470" y="365" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-03-25</text>
  <text x="580" y="365" font-family="Arial, sans-serif" font-size="13" fill="#374151">$2,100.00</text>
  <circle cx="698" cy="361" r="5" fill="#059669"/>
  <rect x="710" y="353" width="45" height="18" rx="9" fill="#059669" opacity="0.1"/>
  <text x="732" y="365" font-family="Arial, sans-serif" font-size="10" fill="#059669" text-anchor="middle">Paid</text>

  <!-- Row 5 - Pending -->
  <line x1="20" y1="382" x2="785" y2="382" stroke="#F3F4F6" stroke-width="1"/>
  <text x="40" y="408" font-family="Arial, sans-serif" font-size="13" fill="#374151">#INV-2024-005</text>
  <text x="180" y="408" font-family="Arial, sans-serif" font-size="13" fill="#374151">Umbrella Corp</text>
  <text x="340" y="408" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-03-15</text>
  <text x="470" y="408" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-03-30</text>
  <text x="580" y="408" font-family="Arial, sans-serif" font-size="13" fill="#374151">$5,600.00</text>
  <circle cx="698" cy="404" r="5" fill="#D97706"/>
  <rect x="710" y="396" width="55" height="18" rx="9" fill="#D97706" opacity="0.1"/>
  <text x="737" y="408" font-family="Arial, sans-serif" font-size="10" fill="#D97706" text-anchor="middle">Pending</text>

  <!-- Footer text -->
  <rect x="0" y="470" width="800" height="30" fill="#374151" opacity="0.05"/>
  <text x="400" y="488" font-family="Arial, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">Screenshot placeholder</text>
</svg>
