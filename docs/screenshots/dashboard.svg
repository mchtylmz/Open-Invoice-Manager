<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="800" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="500">
      <stop offset="0%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="60" fill="url(#header)"/>
  <text x="30" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff">Dashboard</text>
  <circle cx="750" cy="30" r="18" fill="#fff" opacity="0.3"/>
  <circle cx="750" cy="30" r="8" fill="#fff" opacity="0.5"/>

  <!-- Stats Cards -->
  <rect x="20" y="80" width="180" height="90" rx="8" fill="#fff" stroke="#D1D5DB"/>
  <text x="110" y="110" font-family="Arial, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">Total Invoices</text>
  <text x="110" y="145" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#4F46E5" text-anchor="middle">156</text>

  <rect x="215" y="80" width="180" height="90" rx="8" fill="#fff" stroke="#D1D5DB"/>
  <text x="305" y="110" font-family="Arial, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">Total Revenue</text>
  <text x="305" y="145" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#059669" text-anchor="middle">$48.2K</text>

  <rect x="410" y="80" width="180" height="90" rx="8" fill="#fff" stroke="#D1D5DB"/>
  <text x="500" y="110" font-family="Arial, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">Pending</text>
  <text x="500" y="145" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#D97706" text-anchor="middle">23</text>

  <rect x="605" y="80" width="180" height="90" rx="8" fill="#fff" stroke="#D1D5DB"/>
  <text x="695" y="110" font-family="Arial, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">Customers</text>
  <text x="695" y="145" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2563EB" text-anchor="middle">89</text>

  <!-- Table -->
  <rect x="20" y="190" width="765" height="230" rx="8" fill="#fff" stroke="#D1D5DB"/>
  <rect x="20" y="190" width="765" height="40" rx="8" fill="#F9FAFB"/>
  <text x="40" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Recent Invoices</text>

  <!-- Table Header -->
  <line x1="20" y1="230" x2="785" y2="230" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="250" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">INVOICE</text>
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">CUSTOMER</text>
  <text x="380" y="250" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">DATE</text>
  <text x="520" y="250" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">AMOUNT</text>
  <text x="640" y="250" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B7280">STATUS</text>

  <!-- Row 1 -->
  <line x1="20" y1="265" x2="785" y2="265" stroke="#F3F4F6" stroke-width="1"/>
  <text x="40" y="282" font-family="Arial, sans-serif" font-size="12" fill="#374151">#INV-2024-001</text>
  <text x="200" y="282" font-family="Arial, sans-serif" font-size="12" fill="#374151">Acme Corp</text>
  <text x="380" y="282" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-03-15</text>
  <text x="520" y="282" font-family="Arial, sans-serif" font-size="12" fill="#374151">$1,250.00</text>
  <circle cx="648" cy="278" r="5" fill="#059669"/>
  <text x="660" y="282" font-family="Arial, sans-serif" font-size="11" fill="#059669">Paid</text>

  <!-- Row 2 -->
  <line x1="20" y1="298" x2="785" y2="298" stroke="#F3F4F6" stroke-width="1"/>
  <text x="40" y="315" font-family="Arial, sans-serif" font-size="12" fill="#374151">#INV-2024-002</text>
  <text x="200" y="315" font-family="Arial, sans-serif" font-size="12" fill="#374151">Globex Inc</text>
  <text x="380" y="315" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-03-18</text>
  <text x="520" y="315" font-family="Arial, sans-serif" font-size="12" fill="#374151">$3,400.00</text>
  <circle cx="648" cy="311" r="5" fill="#D97706"/>
  <text x="660" y="315" font-family="Arial, sans-serif" font-size="11" fill="#D97706">Pending</text>

  <!-- Row 3 -->
  <line x1="20" y1="331" x2="785" y2="331" stroke="#F3F4F6" stroke-width="1"/>
  <text x="40" y="348" font-family="Arial, sans-serif" font-size="12" fill="#374151">#INV-2024-003</text>
  <text x="200" y="348" font-family="Arial, sans-serif" font-size="12" fill="#374151">Initech</text>
  <text x="380" y="348" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-03-20</text>
  <text x="520" y="348" font-family="Arial, sans-serif" font-size="12" fill="#374151">$750.00</text>
  <circle cx="648" cy="344" r="5" fill="#EF4444"/>
  <text x="660" y="348" font-family="Arial, sans-serif" font-size="11" fill="#EF4444">Overdue</text>

  <!-- Row 4 -->
  <line x1="20" y1="364" x2="785" y2="364" stroke="#F3F4F6" stroke-width="1"/>
  <text x="40" y="381" font-family="Arial, sans-serif" font-size="12" fill="#374151">#INV-2024-004</text>
  <text x="200" y="381" font-family="Arial, sans-serif" font-size="12" fill="#374151">Hooli</text>
  <text x="380" y="381" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-03-22</text>
  <text x="520" y="381" font-family="Arial, sans-serif" font-size="12" fill="#374151">$2,100.00</text>
  <circle cx="648" cy="377" r="5" fill="#059669"/>
  <text x="660" y="381" font-family="Arial, sans-serif" font-size="11" fill="#059669">Paid</text>

  <!-- Row 5 -->
  <line x1="20" y1="397" x2="785" y2="397" stroke="#F3F4F6" stroke-width="1"/>
  <text x="40" y="414" font-family="Arial, sans-serif" font-size="12" fill="#374151">#INV-2024-005</text>
  <text x="200" y="414" font-family="Arial, sans-serif" font-size="12" fill="#374151">Umbrella Corp</text>
  <text x="380" y="414" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">2024-03-25</text>
  <text x="520" y="414" font-family="Arial, sans-serif" font-size="12" fill="#374151">$5,600.00</text>
  <circle cx="648" cy="410" r="5" fill="#D97706"/>
  <text x="660" y="414" font-family="Arial, sans-serif" font-size="11" fill="#D97706">Pending</text>

  <!-- Footer text -->
  <rect x="0" y="470" width="800" height="30" fill="#374151" opacity="0.05"/>
  <text x="400" y="488" font-family="Arial, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">Screenshot placeholder</text>
</svg>
