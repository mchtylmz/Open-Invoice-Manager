  <text x="30" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff">Invoice #INV-2024-001</text>
  <rect x="620" y="18" width="80" height="28" rx="14" fill="#059669"/>
  <text x="660" y="37" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Paid</text>
  <rect x="710" y="18" width="70" height="28" rx="6" fill="#fff" opacity="0.2"/>
