  <rect x="20" y="205" width="765" height="40" rx="8" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="35" y="230" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">Issue Date:</text>
  <text x="120" y="230" font-family="Arial, sans-serif" font-size="12" fill="#374151">2024-03-01</text>
  <text x="250" y="230" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">Due Date:</text>
  <text x="335" y="230" font-family="Arial, sans-serif" font-size="12" fill="#374151">2024-03-15</text>
  <text x="500" y="230" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">Currency:</text>
  <text x="575" y="230" font-family="Arial, sans-serif" font-size="12" fill="#374151">USD ($)</text>

