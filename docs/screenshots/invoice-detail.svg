  <line x1="20" y1="366" x2="785" y2="366" stroke="#F3F4F6" stroke-width="1"/>
  <text x="40" y="386" font-family="Arial, sans-serif" font-size="12" fill="#374151">SEO Optimization Package</text>
  <text x="360" y="386" font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">1</text>
  <text x="460" y="386" font-family="Arial, sans-serif" font-size="12" fill="#374151">$150.00</text>
  <text x="550" y="386" font-family="Arial, sans-serif" font-size="12" fill="#374151">0%</text>
