  <text x="35" y="174" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">info@yourcompany.com</text>

  <rect x="410" y="80" width="370" height="110" rx="8" fill="#fff" stroke="#D1D5DB"/>
