  <text x="425" y="120" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#374151">Acme Corporation</text>
  <text x="425" y="140" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">456 Market Street</text>
  <text x="425" y="157" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">San Francisco, CA 94105</text>
  <text x="425" y="174" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">john@acme.com</text>

