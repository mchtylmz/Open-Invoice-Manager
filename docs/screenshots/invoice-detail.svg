  <line x1="20" y1="333" x2="785" y2="333" stroke="#F3F4F6" stroke-width="1"/>
  <text x="40" y="353" font-family="Arial, sans-serif" font-size="12" fill="#374151">Hosting Setup &amp; Configuration</text>
  <text x="360" y="353" font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">1</text>
  <text x="460" y="353" font-family="Arial, sans-serif" font-size="12" fill="#374151">$200.00</text>
  <text x="550" y="353" font-family="Arial, sans-serif" font-size="12" fill="#374151">10%</text>
  <text x="660" y="353" font-family="Arial, sans-serif" font-size="12" fill="#374151">$220.00</text>

