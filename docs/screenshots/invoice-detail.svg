  <line x1="530" y1="400" x2="785" y2="400" stroke="#D1D5DB" stroke-width="1"/>
  <text x="540" y="423" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">Subtotal:</text>
  <text x="660" y="423" font-family="Arial, sans-serif" font-size="12" fill="#374151">$1,150.00</text>
  <text x="540" y="440" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">Tax (VAT):</text>
  <text x="660" y="440" font-family="Arial, sans-serif" font-size="12" fill="#374151">$100.00</text>
  <text x="530" y="470" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Total:</text>
  <text x="660" y="470" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4F46E5">$1,250.00</text>

  <!-- Footer text -->
  <rect x="0" y="470" width="800" height="30" fill="#374151" opacity="0.05"/>
  <text x="400" y="488" font-family="Arial, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">Screenshot placeholder</text>
